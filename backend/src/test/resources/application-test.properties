server.port=8080

# H2 Database for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT Configuration
app.jwt.secret=myVeryLongSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Email - disabled for tests
app.mail.enabled=false
app.mail.from=test@test.com
app.mail.frontend-url=http://localhost:3000
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.test-connection=false

# Invitations
app.invitation.expires-days=14

# Reminders
app.reminders.reset-table-on-startup=false

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./test-uploads

# Logging
logging.level.root=INFO